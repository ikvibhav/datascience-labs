services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  # Shared backend database for MLflow (experiment metadata) and Prefect (flow runs)
  postgres:
    image: postgres:15
    container_name: stockmonitor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockmonitor_net

  # ── MinIO ────────────────────────────────────────────────────────────────────
  # S3-compatible object store used by MLflow to persist model artifacts
  minio:
    image: minio/minio:latest
    container_name: stockmonitor_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockmonitor_net

  # ── MLflow ───────────────────────────────────────────────────────────────────
  # Experiment tracking server and model registry
  # Artifacts stored in MinIO; metadata stored in Postgres
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.0
    container_name: stockmonitor_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://${MLFLOW_BUCKET}/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://${MLFLOW_BUCKET}/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - stockmonitor_net

  # ── Prefect ──────────────────────────────────────────────────────────────────
  # Pipeline orchestration server — schedules and monitors data ingestion,
  # training, and monitoring flows
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: stockmonitor_prefect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PREFECT_API_URL: http://0.0.0.0:4200/api
    command: prefect server start --host 0.0.0.0 --port 4200
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - stockmonitor_net

  # ── FastAPI ──────────────────────────────────────────────────────────────────
  # Prediction service — loads the Production model from MLflow registry
  # and serves /predict, /health, /drift-status endpoints
  # Built from api/Dockerfile (added in Phase 5)
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: stockmonitor_api
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./monitoring/reports:/app/monitoring/reports
    networks:
      - stockmonitor_net
    profiles:
      - phase5  # only starts when Phase 5 api/Dockerfile exists

  # ── Streamlit ────────────────────────────────────────────────────────────────
  # Existing dashboard — augmented in Phase 7 with Predictions,
  # Model Registry, and Drift Reports tabs
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockmonitor_streamlit
    restart: unless-stopped
    depends_on:
      - prefect
      - mlflow
    environment:
      API_BASE_URL: http://api:8000
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./monitoring/reports:/app/monitoring/reports
    networks:
      - stockmonitor_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  stockmonitor_net:
    driver: bridge
